<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TickTalker — Market Details</title>
  <link rel="icon" type="image/png" href="images/title.png?v=1" />
  <link rel="shortcut icon" type="image/png" href="images/title.png?v=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <header class="header glass">
    <div class="header-inner" style="grid-template-columns: 1fr auto;">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">Tick<em>Talker</em></span>
      </div>
      <a href="index.html" style="color: #f5c842; text-decoration: none; font-weight: bold; padding: 8px 16px; border: 1px solid rgba(245, 200, 66, 0.3); border-radius: 8px;">← Back to Dashboard</a>
    </div>
  </header>

  <main class="main" style="text-align: center; max-width: 600px; margin-top: 50px;">
    
    <div class="glass card">
      <div id="detail-icon" style="font-size: 50px; margin-bottom: 10px;">⏳</div>
      <h1 id="detail-title" style="font-family: 'Syne', sans-serif; font-size: 32px; color: #c9a230; margin-bottom: 20px;">Loading...</h1>
      
      <div id="detail-price" style="font-family: 'Syne', sans-serif; font-size: 64px; font-weight: 800; color: #f0f2f8; transition: color 0.15s ease-out;">
        $---
      </div>
      <p id="detail-time" style="color: #aaa; font-family: monospace; margin-top: 10px;">Waiting for live data...</p>
    </div>

  </main>

  <script src="details.js"></script>
</body>
</html>
