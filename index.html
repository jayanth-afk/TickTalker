<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TickTalker — Multi-Market Dashboard</title>
  <link rel="icon" type="image/png" href="images/title.png?v=1" />
  <link rel="shortcut icon" type="image/png" href="images/title.png?v=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

<header class="header glass" style="display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 15px 30px;">
    
    <div class="logo" style="display: flex; align-items: center; gap: 10px; justify-self: start;">
      <img src="images/title.png" alt="TickTalker Logo" style="height: 40px; width: auto;" />
      <span class="logo-text" style="font-size: 24px; font-weight: bold;"><span class="logo-tick" style="color: #f0f2f8;">Tick</span><em style="color: #c9a230; font-style: normal;">Talker</em></span>
    </div>

    <div class="header-center" style="display: flex; gap: 10px; justify-self: center;">
      <span class="pill" id="market-badge">
        <span class="badge-dot" id="market-dot"></span>
        <span id="market-label">Forex/Stocks: Checking...</span>
      </span>
      <span class="pill" id="crypto-badge">
        <span class="badge-dot open"></span>
        <span>Crypto: Live</span>
      </span>
    </div>
    <button id="theme-toggle" onclick="toggleTheme()" style="
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 50px;
  padding: 8px 16px;
  color: #f0f2f8;
  cursor: pointer;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 500;
  justify-self: end;
">🌙 Dark</button>

    <div></div>
    
  </header>

  <main class="main">

    <section class="controls-bar">
      <div class="search-wrap">
        <input type="text" id="search-input" class="search-input" placeholder="Search markets (e.g., Gold, BTC, AAPL)..." />
      </div>
      <div class="sort-wrap">
        <select id="sort-select" class="sort-select glass">
          <option value="default">Sort: Default</option>
          <option value="high">Price: High to Low</option>
          <option value="low">Price: Low to High</option>
          <option value="az">Name: A to Z</option>
        </select>
      </div>
    </section>

    <section class="grid-container" id="markets-grid">
      </section>
      <div id="no-results" style="display: none; text-align: center; padding: 50px; color: #aaa; font-family: 'Syne', sans-serif;">
    <div style="font-size: 50px; margin-bottom: 10px;">🔍</div>
    <h3>No matching pairs found</h3>
    <p>Try searching for Gold, BTC, or AAPL</p>
</div>

    <section class="news-section" style="margin-top: 40px;">
      <div class="section-head">
        <h2 class="card-title">General Market News</h2>
      </div>
      <div class="news-grid" id="news-grid">
        <div class="glass card news-card"><span class="skeleton sk-news"></span></div>
        <div class="glass card news-card"><span class="skeleton sk-news"></span></div>
      </div>
    </section>

  </main>

  <footer class="footer">
    Data by <a href="https://finnhub.io" target="_blank">Finnhub</a>
    &nbsp;·&nbsp; WebSocket Live Stream &nbsp;·&nbsp; 50 Markets
  </footer>

  <script src="app.js"></script>
  <script type="module" src="analytics.js"></script>
</body>
</html>
